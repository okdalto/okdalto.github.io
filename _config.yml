# --- Site ---
locale          : "ko-KR"
title           : "Okdalto"
title_separator : "·"
name            : "Okdalto"
description     : "옥달토의 블로그 — 딥러닝, 컴퓨터 그래픽스, 그리고 그 사이의 작업들."
url             : "https://okdalto.github.io"
baseurl         : ""
repository      : "okdalto/okdalto.github.io"
timezone        : Asia/Seoul
encoding        : "utf-8"

# --- Comments (utterances) ---
comments:
  provider      : "utterances"
  utterances:
    theme       : "github-light"
    issue_term  : "pathname"

# --- Build ---
markdown    : kramdown
highlighter : rouge
permalink   : /:categories/:title/
excerpt_separator: "\n\n"

kramdown:
  input        : GFM
  hard_wrap    : false
  auto_ids     : true
  smart_quotes : lsquo,rsquo,ldquo,rdquo

plugins:
  - jekyll-feed
  - jekyll-sitemap

# --- Files ---
include:
  - _pages
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - .sass-cache
keep_files:
  - .git

# --- Collections (English translations) ---
collections:
  en:
    output: true
    permalink: /en/:title/

# --- Defaults ---
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      lang: ko
  - scope:
      path: ""
      type: en
    values:
      layout: post
      lang: en
  - scope:
      path: ""
      type: pages
    values:
      layout: page
      lang: ko
