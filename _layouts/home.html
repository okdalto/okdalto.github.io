---
layout: default
---

{%- if page.content and page.content != "" %}
<div class="intro">
  {{ content }}
</div>
{%- endif %}

<ul class="post-list">
  {%- for post in site.posts %}
  <li>
    <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y-%m-%d" }}</time>
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
  </li>
  {%- endfor %}
</ul>
